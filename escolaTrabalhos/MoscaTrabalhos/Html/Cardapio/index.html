<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        h1 {
            margin-top: 30px;
            color: black;
        }

        .botoes {
            margin-top: 50px;
        }

        button {
            display: block;
            width: 200px;
            margin: 10px auto;
            padding: 10px;
            font-size: 16px;
            background-color: #e0e0e0;
            border: 1px solid #999;
            cursor: pointer;
        }

        button:hover {
            background-color: #d0d0d0;
        }
    </style>
</head>

<body>

    <h1>Cardápio</h1>

    <div class="botoes">
        <a href="/seg">
        <button>Segunda-feira</button>
        </a>
        <a href="/ter">
        <button>Terca-feira</button>
        </a>
        <a href="/qua">
        <button>Quarta-feira</button>
        </a>
        <a href="/qui">
        <button>Quinta-feira</button>
        </a>
        <a href="/sex">
        <button>Sexta-feira</button>
        </a>
    </div>

</body>

</html>
